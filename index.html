<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <title>Base Apparel coming soon page</title>
    <link rel="stylesheet" href="styles/styles.css">
  </head>
  <body>
    <header>
      <img class="coming-soon__logo" src="/images/logo.svg" alt="base apparel logo">
    </header>
    <main class="coming-soon__wrapper">
      <picture class="coming-soon__hero-image">
        <source srcset="/images/hero-mobile.jpg" media="(max-width: 768px)"/>
        <source srcset="/images/hero-desktop.jpg" media="(min-width: 768px)"/>
        <img src="/images/hero-mobile.jpg" alt="the image of a young woman"/>
      </picture>
      <div class="coming-soon__content">
        <h1>
          <span class="coming-soon__heading--light">We're</span> coming soon
        </h1>
        <p>Hello fellow shoppers! We're currently building our new fashion store. Add your email below to stay up-to-date with announcements and our launch deals.</p>

        <form action="#" id="form" novalidate>
          <div class="coming-soon__form">
            <label for="email" class="sr-only">Email address</label>
            <input type="email" id="email" size="30" placeholder="Email Address" required/>
            <span class="coming-soon__form-submit">
              <input type="submit" value=''  aria-label="Submit email address">
            </span>
            <span class="coming-soon__form-error" id="error-icon"></span>
          </div>
          <p id="error-message">Please provide a valid email</p>
        </form>
      </div>
    </main>
    <footer>
      <span>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>
      </span>
      <br/>
      <span>Coded by <a href="https://github.com/MBaktygul" target="_blank">Baktygul</a>
      </span>
    </footer>
    <script src="index.js"></script>
  </body>
</html>
